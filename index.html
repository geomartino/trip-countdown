<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mauricie 2026 — Décompte</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #060f0c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
  }

  .wrap {
    position: relative;
    width: min(560px, 96vw);
    background: #0d1f1a;
    border: 0.5px solid #1d5e40;
    border-radius: 20px;
    overflow: hidden;
    padding: 3rem 2rem 2.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .eyebrow {
    position: relative;
    z-index: 2;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #4a9970;
    margin-bottom: 0.4rem;
  }

  .park-name {
    position: relative;
    z-index: 2;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    letter-spacing: 5px;
    color: #7dd3a8;
    margin-bottom: 2rem;
    text-align: center;
  }

  .blocks {
    position: relative;
    z-index: 2;
    display: flex;
    gap: 10px;
    margin-bottom: 2rem;
  }

  .block {
    background: rgba(6, 15, 12, 0.78);
    border: 0.5px solid #1d9e75;
    border-radius: 12px;
    padding: 14px 18px 10px;
    text-align: center;
    min-width: 74px;
  }

  .bnum {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.4rem, 7vw, 3.4rem);
    line-height: 1;
    color: #7dd3a8;
    display: block;
  }

  .blbl {
    font-size: 9px;
    color: #4a9970;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 4px;
    display: block;
  }

  .sep {
    position: relative;
    z-index: 2;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    color: #1d9e75;
    align-self: flex-start;
    margin-top: 14px;
    user-select: none;
  }

  .pills {
    position: relative;
    z-index: 2;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
  }

  .pill {
    font-size: 11px;
    color: #4a9970;
    border: 0.5px solid #1d5e40;
    border-radius: 99px;
    padding: 5px 14px;
    letter-spacing: 0.8px;
  }

  .gone {
    position: relative;
    z-index: 2;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    color: #7dd3a8;
    letter-spacing: 4px;
    text-align: center;
    display: none;
    margin-bottom: 2rem;
  }

  @media (max-width: 420px) {
    .block { min-width: 58px; padding: 10px 10px 8px; }
    .blocks { gap: 6px; }
    .sep { font-size: 2rem; margin-top: 10px; }
  }
</style>
</head>
<body>

<div class="wrap" id="wrap">
  <canvas id="cv"></canvas>

  <p class="eyebrow">🚴 Départ dans</p>
  <p class="park-name">Parc de la Mauricie</p>

  <div class="blocks" id="blocks">
    <div class="block"><span class="bnum" id="dd">--</span><span class="blbl">jours</span></div>
    <div class="sep">:</div>
    <div class="block"><span class="bnum" id="hh">--</span><span class="blbl">heures</span></div>
    <div class="sep">:</div>
    <div class="block"><span class="bnum" id="mm">--</span><span class="blbl">min</span></div>
    <div class="sep">:</div>
    <div class="block"><span class="bnum" id="ss">--</span><span class="blbl">sec</span></div>
  </div>

  <p class="gone" id="gone">C'est le départ ! 🚴</p>

  <div class="pills">
    <span class="pill">400+ km</span>
    <span class="pill">4 jours · 3 nuits</span>
    <span class="pill">11 juin 2026 · 6h00</span>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById('cv');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('wrap');

  function resize() {
    canvas.width = wrap.offsetWidth;
    canvas.height = wrap.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const W = () => canvas.width;
  const H = () => canvas.height;

  const GW = 80, GH = 50;
  const field = new Float32Array(GW * GH);

  function noise2d(x, y) {
    return Math.sin(x * 1.3) * Math.cos(y * 0.9)
         + Math.sin(x * 2.7) * Math.cos(y * 2.1) * 0.5
         + Math.sin(x * 5.1) * Math.cos(y * 4.3) * 0.25
         + Math.sin(x * 0.6) * Math.cos(y * 0.4) * 0.8
         + Math.sin(x * 3.8) * Math.cos(y * 3.2) * 0.15;
  }

  function buildField(t) {
    for (let yi = 0; yi < GH; yi++) {
      for (let xi = 0; xi < GW; xi++) {
        const nx = xi / GW * 4;
        const ny = yi / GH * 3;
        field[yi * GW + xi] = noise2d(nx + t * 0.05, ny);
      }
    }
  }

  function val(xi, yi) {
    return field[yi * GW + xi] ?? 0;
  }

  function marchingSquares(threshold) {
    const segs = [];
    for (let yi = 0; yi < GH - 1; yi++) {
      for (let xi = 0; xi < GW - 1; xi++) {
        const tl = val(xi,     yi)     > threshold ? 1 : 0;
        const tr = val(xi + 1, yi)     > threshold ? 1 : 0;
        const br = val(xi + 1, yi + 1) > threshold ? 1 : 0;
        const bl = val(xi,     yi + 1) > threshold ? 1 : 0;
        const code = tl * 8 + tr * 4 + br * 2 + bl * 1;
        if (code === 0 || code === 15) continue;

        function interp(ax, ay, bx, by) {
          const a = val(ax, ay), b = val(bx, by);
          const frac = (b === a) ? 0.5 : (threshold - a) / (b - a);
          return [ax + (bx - ax) * frac, ay + (by - ay) * frac];
        }

        const edges = [];
        if (tl !== tr) edges.push(interp(xi, yi, xi + 1, yi));
        if (tr !== br) edges.push(interp(xi + 1, yi, xi + 1, yi + 1));
        if (bl !== br) edges.push(interp(xi, yi + 1, xi + 1, yi + 1));
        if (tl !== bl) edges.push(interp(xi, yi, xi, yi + 1));
        if (edges.length >= 2) segs.push([edges[0], edges[1]]);
      }
    }
    return segs;
  }

  function gc(xi, yi) {
    return [xi / GW * W(), yi / GH * H()];
  }

  const levels = [
    { v: -1.4, lw: 1.8, alpha: 0.22 },
    { v: -1.0, lw: 1.0, alpha: 0.16 },
    { v: -0.6, lw: 1.0, alpha: 0.15 },
    { v: -0.2, lw: 1.0, alpha: 0.14 },
    { v:  0.2, lw: 1.0, alpha: 0.13 },
    { v:  0.6, lw: 1.0, alpha: 0.12 },
    { v:  1.0, lw: 1.8, alpha: 0.20 },
    { v:  1.4, lw: 1.0, alpha: 0.11 },
    { v:  1.7, lw: 1.0, alpha: 0.09 },
  ];

  let bikeX = -70;

  function bikeTrackY(x, t) {
    return H() * 0.72 + Math.sin(x / W() * Math.PI * 2.5 + t * 0.4) * H() * 0.06;
  }

  function drawBike(x, y, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    const s = 19;
    ctx.strokeStyle = '#7dd3a8';
    ctx.lineWidth = 1.6;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    ctx.beginPath(); ctx.arc(-s * .56, s * .32, s * .30, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc( s * .56, s * .32, s * .30, 0, Math.PI * 2); ctx.stroke();

    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-s * .56, s * .32); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-s * .22, -s * .28); ctx.lineTo(-s * .56, s * .32); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(s * .30, -s * .22); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s * .30, -s * .22); ctx.lineTo(s * .56, s * .32); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-s * .22, -s * .28); ctx.lineTo(s * .30, -s * .22); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-s * .22, -s * .28); ctx.lineTo(0, 0); ctx.stroke();

    ctx.beginPath(); ctx.moveTo(-s * .22, -s * .28); ctx.lineTo(-s * .22, -s * .46); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-s * .40, -s * .48); ctx.lineTo(-s * .05, -s * .48); ctx.stroke();

    ctx.beginPath(); ctx.moveTo(s * .30, -s * .22); ctx.lineTo(s * .30, -s * .42); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s * .16, -s * .44); ctx.lineTo(s * .44, -s * .40); ctx.stroke();

    ctx.restore();
  }

  let animT = 0;

  function draw(ts) {
    animT = ts * 0.001;
    ctx.clearRect(0, 0, W(), H());

    buildField(animT);

    levels.forEach(({ v, lw, alpha }) => {
      const segs = marchingSquares(v);
      ctx.strokeStyle = `rgba(29,158,117,${alpha})`;
      ctx.lineWidth = lw;
      ctx.lineCap = 'round';
      segs.forEach(([p0, p1]) => {
        const [x0, y0] = gc(p0[0], p0[1]);
        const [x1, y1] = gc(p1[0], p1[1]);
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        ctx.lineTo(x1, y1);
        ctx.stroke();
      });
    });

    bikeX += 0.6;
    if (bikeX > W() + 80) bikeX = -70;

    const by = bikeTrackY(bikeX, animT);
    const dx = 6;
    const y1 = bikeTrackY(bikeX - dx, animT);
    const y2 = bikeTrackY(bikeX + dx, animT);
    const angle = Math.atan2(y2 - y1, dx * 2);

    drawBike(bikeX, by - 16, angle);

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);

  // Countdown
  const target = new Date('2026-06-11T06:00:00');
  const pad = n => String(Math.max(0, n)).padStart(2, '0');

  function tick() {
    const diff = target - new Date();
    if (diff <= 0) {
      document.getElementById('blocks').style.display = 'none';
      document.getElementById('gone').style.display = 'block';
      return;
    }
    document.getElementById('dd').textContent = pad(Math.floor(diff / 86400000));
    document.getElementById('hh').textContent = pad(Math.floor((diff % 86400000) / 3600000));
    document.getElementById('mm').textContent = pad(Math.floor((diff % 3600000) / 60000));
    document.getElementById('ss').textContent = pad(Math.floor((diff % 60000) / 1000));
  }

  tick();
  setInterval(tick, 1000);
})();
</script>
</body>
</html>
