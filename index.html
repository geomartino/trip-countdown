<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mauricie 2026 — Décompte</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #060f0c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
  }

  .wrap {
    position: relative;
    width: min(560px, 96vw);
    background: #0d1f1a;
    border: 0.5px solid #1d5e40;
    border-radius: 20px;
    overflow: hidden;
    padding: 3rem 2rem 2.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .eyebrow {
    position: relative;
    z-index: 2;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #4a9970;
    margin-bottom: 0.4rem;
  }

  .park-name {
    position: relative;
    z-index: 2;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    letter-spacing: 5px;
    color: #7dd3a8;
    margin-bottom: 2rem;
    text-align: center;
  }

  .blocks {
    position: relative;
    z-index: 2;
    display: flex;
    gap: 10px;
    margin-bottom: 2rem;
  }

  .block {
    background: rgba(6, 15, 12, 0.72);
    border: 0.5px solid #1d9e75;
    border-radius: 12px;
    padding: 14px 18px 10px;
    text-align: center;
    min-width: 74px;
  }

  .bnum {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.4rem, 7vw, 3.4rem);
    line-height: 1;
    color: #7dd3a8;
    display: block;
  }

  .blbl {
    font-size: 9px;
    color: #4a9970;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 4px;
    display: block;
  }

  .sep {
    position: relative;
    z-index: 2;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    color: #1d9e75;
    align-self: flex-start;
    margin-top: 14px;
    user-select: none;
  }

  .pills {
    position: relative;
    z-index: 2;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
  }

  .pill {
    font-size: 11px;
    color: #4a9970;
    border: 0.5px solid #1d5e40;
    border-radius: 99px;
    padding: 5px 14px;
    letter-spacing: 0.8px;
  }

  .gone {
    position: relative;
    z-index: 2;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    color: #7dd3a8;
    letter-spacing: 4px;
    text-align: center;
    display: none;
  }

  @media (max-width: 420px) {
    .block { min-width: 58px; padding: 10px 10px 8px; }
    .blocks { gap: 6px; }
    .sep { font-size: 2rem; margin-top: 10px; }
  }
</style>
</head>
<body>

<div class="wrap" id="wrap">
  <canvas id="cv"></canvas>

  <p class="eyebrow">🚴 Départ dans</p>
  <p class="park-name">Parc de la Mauricie</p>

  <div class="blocks" id="blocks">
    <div class="block"><span class="bnum" id="dd">--</span><span class="blbl">jours</span></div>
    <div class="sep">:</div>
    <div class="block"><span class="bnum" id="hh">--</span><span class="blbl">heures</span></div>
    <div class="sep">:</div>
    <div class="block"><span class="bnum" id="mm">--</span><span class="blbl">min</span></div>
    <div class="sep">:</div>
    <div class="block"><span class="bnum" id="ss">--</span><span class="blbl">sec</span></div>
  </div>

  <p class="gone" id="gone">C'est le départ ! 🚴</p>

  <div class="pills">
    <span class="pill">400+ km</span>
    <span class="pill">4 jours · 3 nuits</span>
    <span class="pill">11 juin 2026 · 6h00</span>
  </div>
</div>

<script>
(function () {
  const canvas = document.getElementById('cv');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('wrap');

  function resize() {
    canvas.width = wrap.offsetWidth;
    canvas.height = wrap.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const W = () => canvas.width;
  const H = () => canvas.height;

  const curves = [
    { yBase: 0.93, amp: 0.03, freq: 0.6,  phase: 0.0,  alpha: 0.18 },
    { yBase: 0.84, amp: 0.06, freq: 0.5,  phase: 0.4,  alpha: 0.16 },
    { yBase: 0.74, amp: 0.05, freq: 0.75, phase: 1.1,  alpha: 0.14 },
    { yBase: 0.63, amp: 0.09, freq: 0.9,  phase: 0.7,  alpha: 0.13 },
    { yBase: 0.53, amp: 0.07, freq: 0.55, phase: 1.8,  alpha: 0.13 },
    { yBase: 0.43, amp: 0.11, freq: 0.8,  phase: 2.3,  alpha: 0.12 },
    { yBase: 0.33, amp: 0.08, freq: 1.1,  phase: 0.9,  alpha: 0.11 },
    { yBase: 0.23, amp: 0.13, freq: 0.65, phase: 3.1,  alpha: 0.10 },
    { yBase: 0.14, amp: 0.06, freq: 1.0,  phase: 1.5,  alpha: 0.09 },
    { yBase: 0.07, amp: 0.04, freq: 1.3,  phase: 2.8,  alpha: 0.08 },
  ];

  const BIKE_CURVE = 3;
  let bikeX = -70;
  let t = 0;

  function curveY(c, x, time) {
    const nx = x / W();
    return c.yBase + Math.sin(nx * Math.PI * 2 * c.freq + c.phase + time * 0.28) * c.amp;
  }

  function drawBike(x, y, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    const s = 20;
    ctx.strokeStyle = '#7dd3a8';
    ctx.lineWidth = 1.6;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // roues
    ctx.beginPath(); ctx.arc(-s * 0.56, s * 0.32, s * 0.30, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc( s * 0.56, s * 0.32, s * 0.30, 0, Math.PI * 2); ctx.stroke();

    // base du pédalier → axe arrière
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-s * 0.56, s * 0.32); ctx.stroke();

    // haubans → axe arrière
    ctx.beginPath(); ctx.moveTo(-s * 0.22, -s * 0.28); ctx.lineTo(-s * 0.56, s * 0.32); ctx.stroke();

    // tube diagonal pédalier → fourche
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(s * 0.30, -s * 0.22); ctx.stroke();

    // fourche → roue avant
    ctx.beginPath(); ctx.moveTo(s * 0.30, -s * 0.22); ctx.lineTo(s * 0.56, s * 0.32); ctx.stroke();

    // tube supérieur
    ctx.beginPath(); ctx.moveTo(-s * 0.22, -s * 0.28); ctx.lineTo(s * 0.30, -s * 0.22); ctx.stroke();

    // tube de selle
    ctx.beginPath(); ctx.moveTo(-s * 0.22, -s * 0.28); ctx.lineTo(0, 0); ctx.stroke();

    // tige de selle
    ctx.beginPath(); ctx.moveTo(-s * 0.22, -s * 0.28); ctx.lineTo(-s * 0.22, -s * 0.46); ctx.stroke();

    // selle
    ctx.beginPath(); ctx.moveTo(-s * 0.40, -s * 0.48); ctx.lineTo(-s * 0.05, -s * 0.48); ctx.stroke();

    // potence
    ctx.beginPath(); ctx.moveTo(s * 0.30, -s * 0.22); ctx.lineTo(s * 0.30, -s * 0.42); ctx.stroke();

    // cintre
    ctx.beginPath(); ctx.moveTo(s * 0.16, -s * 0.44); ctx.lineTo(s * 0.44, -s * 0.40); ctx.stroke();

    ctx.restore();
  }

  function draw(time) {
    t = time * 0.001;
    ctx.clearRect(0, 0, W(), H());

    curves.forEach(c => {
      ctx.beginPath();
      for (let x = 0; x <= W(); x += 3) {
        const y = curveY(c, x, t) * H();
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(29,158,117,${c.alpha})`;
      ctx.lineWidth = 1.1;
      ctx.stroke();
    });

    bikeX += 0.55;
    if (bikeX > W() + 80) bikeX = -70;

    const rc = curves[BIKE_CURVE];
    const bikeY = curveY(rc, bikeX, t) * H();
    const dx = 5;
    const y1 = curveY(rc, bikeX - dx, t) * H();
    const y2 = curveY(rc, bikeX + dx, t) * H();
    const angle = Math.atan2(y2 - y1, dx * 2);

    drawBike(bikeX, bikeY - 16, angle);

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);

  // Countdown
  const target = new Date('2026-06-11T06:00:00');
  const pad = n => String(Math.max(0, n)).padStart(2, '0');

  function tick() {
    const diff = target - new Date();
    if (diff <= 0) {
      document.getElementById('blocks').style.display = 'none';
      document.getElementById('gone').style.display = 'block';
      return;
    }
    document.getElementById('dd').textContent = pad(Math.floor(diff / 86400000));
    document.getElementById('hh').textContent = pad(Math.floor((diff % 86400000) / 3600000));
    document.getElementById('mm').textContent = pad(Math.floor((diff % 3600000) / 60000));
    document.getElementById('ss').textContent = pad(Math.floor((diff % 60000) / 1000));
  }

  tick();
  setInterval(tick, 1000);
})();
</script>
</body>
</html>
